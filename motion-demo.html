<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motion Demo | ミス近畿大学2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#5B6BAE; --pink:#D988A8; --text:#1A1A2E;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:"Noto Sans JP",sans-serif;
    color:#fff; overflow:hidden; background:#fff;
  }

  .stage{position:relative; width:100%; height:100vh; overflow:hidden;}

  /* ---- Hero (revealed under the loader) ---- */
  .hero{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    background:linear-gradient(150deg,#5B6BAE 0%,#8E77B4 48%,#D988A8 100%);
    padding:0 28px;
  }
  .hero::before,.hero::after{
    content:""; position:absolute; border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,.26),transparent 70%);
    pointer-events:none;
  }
  .hero::before{width:340px;height:340px;top:-90px;right:-80px;}
  .hero::after{width:320px;height:320px;bottom:-100px;left:-70px;}

  /* small logo badge that settles at the top of the hero */
  .hero__logo{
    position:absolute; top:24px; left:50%;
    width:64px; height:64px; border-radius:50%;
    background:#fff; padding:9px;
    box-shadow:0 8px 24px rgba(26,26,46,.18);
    opacity:0; transform:translateX(-50%) translateY(16px);
  }
  .hero__logo img{width:100%;height:100%;object-fit:contain;display:block;}

  .hero__sub{
    font-family:"Cormorant Garamond",serif;
    letter-spacing:.28em; text-transform:uppercase;
    font-size:.9rem; opacity:0; transform:translateY(16px);
  }
  .hero__title{
    font-size:clamp(2rem,9vw,3.4rem); font-weight:700;
    letter-spacing:.04em; line-height:1.3; margin:18px 0;
    white-space:nowrap; opacity:0; transform:translateY(24px);
    text-shadow:0 4px 24px rgba(26,26,46,.2);
  }
  .hero__year{
    font-family:"Cormorant Garamond",serif; letter-spacing:.22em;
    font-size:.85rem; opacity:0; transform:translateY(16px);
  }
  .hero__btn{
    margin-top:34px; padding:13px 34px; border-radius:999px;
    background:rgba(255,255,255,.16); border:1.5px solid rgba(255,255,255,.7);
    color:#fff; font-size:.9rem; font-weight:600; letter-spacing:.04em;
    -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px);
    opacity:0; transform:translateY(16px);
  }

  /* ---- Loader overlay (white) ---- */
  .loader{
    position:absolute; inset:0; z-index:10;
    display:flex; align-items:center; justify-content:center;
    background:#fff;
  }

  /* ---- Title key-visual (phase 1) ---- */
  .title{
    position:absolute; inset:0; z-index:12; opacity:0; overflow:hidden;
    background:#EDE9F6;
  }
  .title img{ width:100%; height:100%; object-fit:cover; display:block; }
  /* countdown key-visual — whole image visible, no cropping */
  .emblem{
    position:absolute; inset:0; overflow:hidden; opacity:0;
    background:#FBFCFE;                 /* matches the image's light edges = seamless */
  }
  .emblem img{
    width:100%; height:100%;
    object-fit:contain;                 /* show the entire image, auto-fit any screen */
    display:block; transform:scale(1.03);
  }

  /* ===== PLAY states (timeline) ===== */
  /* 1) Title card: in → hold → out (0s–2.2s) */
  .stage.play .title{animation:titleSeq 2.4s ease .2s forwards;}
  /* 2) Countdown key-visual (from ~2.4s) */
  .stage.play .emblem{animation:kvIn 1.2s ease 2.4s forwards;}
  .stage.play .emblem img{animation:kvZoom 3.6s ease 2.4s forwards;}   /* gentle ken-burns */
  /* 3) White loader fades out → hero (from ~4.8s) */
  .stage.play .loader{animation:loaderOut 1s ease forwards; animation-delay:4.8s;}

  .stage.play .hero__sub{animation:fadeUp .9s ease 4.9s forwards;}
  .stage.play .hero__title{animation:fadeUp 1s ease 5.05s forwards;}
  .stage.play .hero__year{animation:fadeUp .9s ease 5.3s forwards;}
  .stage.play .hero__btn{animation:fadeUp .9s ease 5.5s forwards;}

  @keyframes titleSeq{
    0%{opacity:0; transform:translateY(12px);}
    18%{opacity:1; transform:translateY(0);}
    72%{opacity:1; transform:translateY(0);}
    100%{opacity:0; transform:translateY(-10px);}
  }
  @keyframes kvIn{ to{opacity:1;} }
  @keyframes kvZoom{ to{transform:scale(1);} }
  @keyframes loaderOut{0%{opacity:1;}100%{opacity:0; visibility:hidden;}}
  @keyframes fadeUp{to{opacity:1; transform:translateY(0);}}
  @keyframes fadeUpLogo{to{opacity:1; transform:translateX(-50%) translateY(0);}}

  .particle{
    position:absolute; border-radius:50%;
    background:rgba(255,255,255,.85); opacity:0; z-index:2; pointer-events:none;
  }
  .stage.play .particle{animation:floatUp linear forwards;}
  @keyframes floatUp{
    0%{opacity:0; transform:translateY(30px) scale(.6);}
    15%{opacity:.9;}
    100%{opacity:0; transform:translateY(-120px) scale(1);}
  }

  .controls{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    z-index:50; display:flex; gap:10px;
  }
  .controls button{
    font-family:"Noto Sans JP"; font-size:.8rem; font-weight:600;
    padding:10px 20px; border-radius:999px; border:none; cursor:pointer;
    background:rgba(26,26,46,.72); color:#fff; letter-spacing:.04em;
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
  }
  .controls button:hover{background:rgba(26,26,46,.9);}
  .hint{
    position:fixed; top:14px; left:50%; transform:translateX(-50%);
    z-index:50; font-size:.72rem; letter-spacing:.05em;
    color:rgba(26,26,46,.55); background:rgba(255,255,255,.7);
    padding:6px 14px; border-radius:999px;
    -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px);
  }

  @media (prefers-reduced-motion: reduce){
    .stage.play *{animation-duration:.001s !important;}
  }
</style>
</head>
<body>

<div class="hint">オープニング演出デモ</div>

<div class="stage" id="stage">

  <!-- Hero underneath -->
  <div class="hero">
    <p class="hero__sub">Miss Kindai University 2026</p>
    <h1 class="hero__title">魅せる、私らしさ。</h1>
    <p class="hero__year">— THE 2026 OFFICIAL CONTEST —</p>
    <button class="hero__btn">ファイナリストを見る</button>
  </div>

  <!-- Loader overlay -->
  <div class="loader">
    <!-- phase 1: title key-visual -->
    <div class="title">
      <img src="image/opening_title.png" alt="KINDAI MISS CAMPUS CONTEST 2026 魅せる、私らしさ。">
    </div>
    <!-- phase 2: countdown key-visual -->
    <div class="emblem">
      <img src="image/countdown.png" alt="ファイナリスト発表まで 10 Days Left 2026.09.14">
    </div>
  </div>

</div>

<div class="controls">
  <button id="replay">▶ もう一度再生</button>
</div>

<script>
  const stage = document.getElementById('stage');

  function spawnParticles(){
    stage.querySelectorAll('.particle').forEach(p=>p.remove());
    for(let i=0;i<14;i++){
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 4 + Math.random()*8;
      p.style.width = p.style.height = size+'px';
      p.style.left = (5 + Math.random()*90)+'%';
      p.style.top  = (40 + Math.random()*55)+'%';
      p.style.animationDuration = (3 + Math.random()*3)+'s';
      p.style.animationDelay = (4.9 + Math.random()*2)+'s';
      stage.appendChild(p);
    }
  }

  function play(){
    stage.classList.remove('play');
    void stage.offsetWidth; // restart animations
    spawnParticles();
    stage.classList.add('play');
  }

  document.getElementById('replay').addEventListener('click', play);
  window.addEventListener('load', play);
</script>
</body>
</html>
